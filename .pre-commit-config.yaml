repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: "v4.16.3"
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]
        args:
          - --rev-range
          - origin/main..HEAD

  - repo: https://github.com/python-poetry/poetry
    rev: "2.4.1"
    hooks:
      - id: poetry-check
      - id: poetry-lock
      - id: poetry-install

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-toml
